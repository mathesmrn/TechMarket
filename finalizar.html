<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | TechMarket</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-wrapper {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px 80px;
            background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 100%);
        }

        .auth-card {
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        .auth-card-header {
            background: linear-gradient(135deg, var(--primary-green), var(--dark-green));
            padding: 35px 40px;
            text-align: center;
            color: white;
        }

        .auth-card-header .logo {
            justify-content: center;
            color: white;
            margin-bottom: 10px;
            font-size: 1.6rem;
        }

        .auth-card-header .logo i {
            color: white;
        }

        .auth-card-header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .auth-card-body {
            padding: 35px 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--dark-gray);
            margin-bottom: 8px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--medium-gray);
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
            background-color: var(--light-gray);
            font-family: 'Inter', sans-serif;
        }

        .form-group input:focus {
            border-color: var(--primary-green);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
        }

        .form-row-extra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .form-row-extra label {
            display: flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            color: var(--dark-gray);
        }

        .form-row-extra input[type="checkbox"] {
            accent-color: var(--primary-green);
            width: 15px;
            height: 15px;
        }

        .form-row-extra a {
            color: var(--dark-green);
            font-weight: 600;
            transition: var(--transition);
        }

        .form-row-extra a:hover {
            color: var(--primary-green);
        }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 14px 0 rgba(34, 197, 94, 0.35);
        }

        .btn-auth:hover {
            background-color: var(--dark-green);
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 22px 0;
            color: var(--medium-gray);
            font-size: 0.82rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #e5e7eb;
        }

        .btn-social {
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
            color: var(--dark-gray);
            font-family: 'Inter', sans-serif;
            margin-bottom: 10px;
        }

        .btn-social:hover {
            border-color: var(--primary-green);
            background-color: var(--light-green);
        }

        .btn-social img {
            width: 18px;
            height: 18px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 22px;
            font-size: 0.88rem;
            color: var(--medium-gray);
            padding-top: 22px;
            border-top: 1px solid #e5e7eb;
        }

        .auth-footer a {
            color: var(--dark-green);
            font-weight: 700;
            transition: var(--transition);
        }

        .auth-footer a:hover {
            color: var(--primary-green);
        }

        .eco-tip {
            background: var(--light-green);
            border-left: 3px solid var(--primary-green);
            border-radius: 0 8px 8px 0;
            padding: 12px 15px;
            font-size: 0.82rem;
            color: var(--dark-green);
            margin-bottom: 22px;
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html" style="display:flex;align-items:center;gap:10px;">
                    <i class="fas fa-recycle"></i>
                    <span>TechMarket</span>
                </a>
            </div>
            <nav class="nav-menu">
                <a href="index.html">Início</a>
                <a href="cadastro.html" class="btn-advertise">Criar conta</a>
            </nav>
        </div>
    </header>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="logo">
                    <i class="fas fa-recycle"></i>
                    <span>TechMarket</span>
                </div>
                <p>Bem-vindo de volta! Faça login para continuar.</p>
            </div>

            <div class="auth-card-body">

                <div class="eco-tip">
                    <i class="fas fa-leaf" style="margin-top:2px; flex-shrink:0;"></i>
                    <span>Já são <strong>+12.400 produtos</strong> de lixo eletrônico circulando na plataforma. Faça parte!</span>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="seu@email.com">
                    </div>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="senha" placeholder="••••••••">
                    </div>
                </div>

                <div class="form-row-extra">
                    <label>
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#">Esqueci minha senha</a>
                </div>

                <button class="btn-auth">
                    <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i> Entrar
                </button>

                <div class="divider">ou entre com</div>

                <button class="btn-social">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
                    Continuar com Google
                </button>

                <div class="auth-footer">
                    Não tem uma conta? <a href="cadastro.html">Cadastre-se grátis</a>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom">
        <div class="bottom-item"><i class="fa-solid fa-house"></i><a href="index.html">Início</a></div>
        <div class="bottom-item"><i class="fa-solid fa-cart-shopping"></i><a href="carrinho.html">Carrinho</a></div>
        <div class="bottom-item"><i class="fa-solid fa-table-cells-large"></i><a href="conversas.html">Conversas</a></div>
        <div class="bottom-item"><i class="fa-solid fa-bars"></i><a href="mais.html">Mais</a></div>
    </div>

</body>
</html>
